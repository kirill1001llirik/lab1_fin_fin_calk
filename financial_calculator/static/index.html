<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Финансовый калькулятор</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <h1>Финансовый калькулятор</h1>
      <p>Наркевич Кирилл Павлович, 3 курс, 2 группа, 2026 год, Минск</p>
    </header>

    <section class="calculator" aria-label="Финансовый калькулятор">
      <form id="calculator-form" autocomplete="off">
        <div class="expression-grid" aria-label="Выражение">
          <label class="field">
            <span>Число 1</span>
            <input id="number-1" name="number1" type="text" inputmode="decimal" value="0">
          </label>

          <label class="operator">
            <span>Операция</span>
            <select name="operation1" aria-label="Операция между числом 1 и скобками">
              <option value="+" selected>+</option>
              <option value="-">−</option>
              <option value="*">×</option>
              <option value="/">÷</option>
            </select>
          </label>

          <div class="group-mark" aria-hidden="true">(</div>

          <label class="field">
            <span>Число 2</span>
            <input id="number-2" name="number2" type="text" inputmode="decimal" value="0">
          </label>

          <label class="operator">
            <span>Операция</span>
            <select name="operation2" aria-label="Операция между числом 2 и числом 3">
              <option value="+" selected>+</option>
              <option value="-">−</option>
              <option value="*">×</option>
              <option value="/">÷</option>
            </select>
          </label>

          <label class="field">
            <span>Число 3</span>
            <input id="number-3" name="number3" type="text" inputmode="decimal" value="0">
          </label>

          <div class="group-mark" aria-hidden="true">)</div>

          <label class="operator">
            <span>Операция</span>
            <select name="operation3" aria-label="Операция между скобками и числом 4">
              <option value="+" selected>+</option>
              <option value="-">−</option>
              <option value="*">×</option>
              <option value="/">÷</option>
            </select>
          </label>

          <label class="field">
            <span>Число 4</span>
            <input id="number-4" name="number4" type="text" inputmode="decimal" value="0">
          </label>
        </div>

        <button type="submit">Вычислить</button>
      </form>

      <section class="results" aria-label="Результаты">
        <div class="result-card">
          <span>Результат вычисления</span>
          <output id="result" aria-live="polite">0</output>
        </div>

        <fieldset class="rounding">
          <legend>Округление итогового результата до целых</legend>
          <label>
            <input type="radio" name="rounding" value="math" checked>
            <span>Математическое</span>
          </label>
          <label>
            <input type="radio" name="rounding" value="bank">
            <span>Бухгалтерское</span>
          </label>
          <label>
            <input type="radio" name="rounding" value="truncate">
            <span>Усечение</span>
          </label>
        </fieldset>

        <div class="result-card">
          <span>Округленный результат</span>
          <output id="rounded-result" aria-live="polite">0</output>
        </div>
      </section>

      <p class="hint">Допустимый диапазон: от -1 000 000 000 000.0000000000 до 1 000 000 000 000.0000000000.</p>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
